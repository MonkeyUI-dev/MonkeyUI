# fly.toml app configuration file generated for vibecoding-design-kb-demo on 2026-01-27T12:20:38+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vibecoding-design-kb-demo'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"
  ignorefile = ".dockerignore"

[env]
  PORT = '8080'
  DEBUG = 'False'
  FILE_STORAGE_BACKEND = 's3'
  
  # Language
  LANGUAGE_CODE = 'en-us'
  
  # LLM
  DEFAULT_LLM_PROVIDER = 'openrouter'
  OPENROUTER_MODEL = 'google/gemini-3-pro-preview'
  OPENROUTER_BASE_URL = 'https://openrouter.ai/api/v1'

  # Django will automatically include {APP_NAME}.fly.dev in ALLOWED_HOSTS
  ALLOWED_HOSTS = 'localhost,127.0.0.1'
  
  # CORS - Frontend is served from same domain, but add others if needed
  # CORS_ALLOWED_ORIGINS = 'https://your-external-frontend.com'

# Define multiple processes: web app and celery worker
[processes]
  app = "sh -c '/opt/venv/bin/python manage.py migrate --noinput && /opt/venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile -'"
  worker = "/opt/venv/bin/celery -A config worker --loglevel=info --concurrency=2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # Health check configuration
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/health/"
    timeout = "5s"
    headers = { Host = "vibecoding-design-kb-demo.fly.dev" }

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['worker']
